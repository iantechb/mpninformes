services:
  - type: web
    name: mpn-informes
    env: ruby
    plan: free
    rootDir: .
    buildCommand: bundle install
    startCommand: ruby server.rb
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: APP_BIND
        value: 0.0.0.0
      - key: DB_PATH
        value: /tmp/app.sqlite3
      - key: SESSION_SECRET
        generateValue: true
      - key: DEFAULT_ADMIN_USERNAME
        value: admin
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_PASTOR_PASSWORD
        sync: false
